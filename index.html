<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glass Flip Clock Countdown</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚡Glass Flip Clock Countdown⚡</h1>

<div class="clock">

  <div class="card flip-card" id="hours">
    <div class="top">00</div>
    <div class="bottom">00</div>
    <div class="label">HRS</div>
  </div>


  
  <div class="card flip-card" id="minutes">
    <div class="top">01</div>
    <div class="bottom">01</div>
    <div class="label">MIN</div>
  </div>

  <div class="card flip-card" id="seconds">
    <div class="top">00</div>
    <div class="bottom">00</div>
    <div class="label">SEC</div>
  </div>

</div>


<script src="script.js"></script>
</body>
</html>
